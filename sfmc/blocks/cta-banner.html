<!-- AWC content block — cta-banner
     In SFMC: Content Builder > Create > Content Block (HTML), paste this, save to the "AWC Modules" folder.
     Responsive classes (.col-2, .stat, .btn-a, …) are defined in the template <head> — blocks live inside a template. -->
<!-- ============================================================
       MODULE 11 — CTA BANNER  [EDITABLE]  (full-width colour block)
       Outlook gets a solid VML/bgcolor fill; one strong CTA.
       ============================================================ -->
  <table role="presentation" width="100%" cellpadding="0" cellspacing="0" border="0" bgcolor="#E1670F" style="background-color:#E1670F;">
    <tr>
      <td align="center">
        <table role="presentation" width="640" cellpadding="0" cellspacing="0" border="0" class="container" style="width:640px; max-width:640px;">
          <tr>
            <td class="px font-head h-1" align="center" style="padding:38px 40px 0 40px; font-family:'Poppins',Arial,sans-serif; font-size:26px; line-height:32px; font-weight:700; color:#FFFFFF; text-align:center;">
              Be a force for nature
            </td>
          </tr>
          <tr>
            <td class="px font-body" align="center" style="padding:10px 50px 0 50px; font-family:'Helvetica Neue',Arial,sans-serif; font-size:16px; line-height:24px; color:#FFF3EA; text-align:center;">
              Your support accelerates our conservation efforts before it's too late.
            </td>
          </tr>
          <tr>
            <td class="px" align="center" style="padding:22px 40px 40px 40px;">
              <!-- CTA BUTTON on colour block — white button, orange text [EDITABLE] -->
              <table role="presentation" cellpadding="0" cellspacing="0" border="0" class="btnwrap" style="margin:0 auto;">
                <tr>
                  <td align="center" bgcolor="#FFFFFF" class="btn-td" style="border-radius:4px;">
                    <!--[if mso]>
                    <v:roundrect xmlns:v="urn:schemas-microsoft-com:vml" xmlns:w="urn:schemas-microsoft-com:office:word" href="#" style="height:48px;v-text-anchor:middle;width:180px;" arcsize="9%" stroke="f" fillcolor="#FFFFFF">
                    <w:anchorlock/><center style="color:#C4560B;font-family:Arial,sans-serif;font-size:16px;font-weight:bold;">Support AWC</center>
                    </v:roundrect>
                    <![endif]-->
                    <!--[if !mso]><!-->
                    <a href="#" class="btn-a font-head" style="display:inline-block; padding:14px 32px; font-family:'Poppins',Arial,sans-serif; font-size:16px; font-weight:700; line-height:20px; color:#C4560B; text-decoration:none; border-radius:4px; background-color:#FFFFFF;">Support AWC</a>
                    <!--<![endif]-->
                  </td>
                </tr>
              </table>
            </td>
          </tr>
        </table>
      </td>
    </tr>
  </table>

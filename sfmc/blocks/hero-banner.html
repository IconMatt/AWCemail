<!-- AWC content block — hero-banner
     In SFMC: Content Builder > Create > Content Block (HTML), paste this, save to the "AWC Modules" folder.
     Responsive classes (.col-2, .stat, .btn-a, …) are defined in the template <head> — blocks live inside a template. -->
<!-- ============================================================
       MODULE 2 — HERO BANNER  [EDITABLE]
       Full-bleed photo with overlaid headline + CTA.
       Outlook gets a VML background image; other clients use a real
       background-image with a dark scrim for legible overlay text.
       Mobile note: headline scales down via .h-hero; scrim guarantees
       contrast — non-overlay fallback documented in README.
       ============================================================ -->
  <table role="presentation" width="100%" cellpadding="0" cellspacing="0" border="0" bgcolor="#3A4232" style="background-color:#3A4232;">
    <tr>
      <td align="center">
        <table role="presentation" width="640" cellpadding="0" cellspacing="0" border="0" class="container" style="width:640px; max-width:640px;">
          <tr>
            <td background="../../assets/images/Conservation%20Partnerships-1_0.jpg" bgcolor="#5C6750" valign="bottom"
                style="background-image:url('../../assets/images/Conservation%20Partnerships-1_0.jpg'); background-size:cover; background-position:center; height:360px;">
              <!--[if mso]>
              <v:rect xmlns:v="urn:schemas-microsoft-com:vml" fill="true" stroke="false" style="width:640px; height:360px;">
                <v:fill type="frame" src="../../assets/images/Conservation%20Partnerships-1_0.jpg" color="#5C6750" />
                <v:textbox inset="0,0,0,0">
              <![endif]-->
              <div>
                <!-- dark scrim band for overlay legibility -->
                <table role="presentation" width="100%" cellpadding="0" cellspacing="0" border="0">
                  <tr>
                    <td height="160" style="height:160px;">&nbsp;</td>
                  </tr>
                  <tr>
                    <td class="px" align="left" valign="bottom" style="padding:24px 30px 28px 30px; background-color:rgba(28,32,24,0.55);">
                      <h1 class="font-head h-hero" style="margin:0 0 8px 0; font-family:'Poppins',Arial,sans-serif; font-size:34px; line-height:40px; font-weight:700; color:#FFFFFF; text-shadow:0 1px 3px rgba(0,0,0,0.4);">
                        Protect Australia's unique wildlife
                      </h1>
                      <p class="font-body" style="margin:0 0 18px 0; font-family:'Helvetica Neue',Arial,sans-serif; font-size:16px; line-height:23px; color:#F3F1EA; text-shadow:0 1px 2px rgba(0,0,0,0.4);">
                        Together we are restoring wildlife and habitats at scale.
                      </p>
                      <!-- CTA BUTTON [EDITABLE] -->
                      <table role="presentation" cellpadding="0" cellspacing="0" border="0" class="btnwrap" style="margin:0;">
                        <tr>
                          <td align="center" bgcolor="#E1670F" class="btn-td" style="border-radius:4px;">
                            <!--[if mso]>
                            <v:roundrect xmlns:v="urn:schemas-microsoft-com:vml" xmlns:w="urn:schemas-microsoft-com:office:word" href="https://www.australianwildlife.org" style="height:48px;v-text-anchor:middle;width:170px;" arcsize="9%" stroke="f" fillcolor="#E1670F">
                            <w:anchorlock/><center style="color:#ffffff;font-family:Arial,sans-serif;font-size:16px;font-weight:bold;">Learn more</center>
                            </v:roundrect>
                            <![endif]-->
                            <!--[if !mso]><!-->
                            <a href="https://www.australianwildlife.org" class="btn-a font-head" style="display:inline-block; padding:14px 30px; font-family:'Poppins',Arial,sans-serif; font-size:16px; font-weight:700; line-height:20px; color:#FFFFFF; text-decoration:none; border-radius:4px; background-color:#E1670F;">Learn more</a>
                            <!--<![endif]-->
                          </td>
                        </tr>
                      </table>
                    </td>
                  </tr>
                </table>
              </div>
              <!--[if mso]>
                </v:textbox>
              </v:rect>
              <![endif]-->
            </td>
          </tr>
        </table>
      </td>
    </tr>
  </table>
